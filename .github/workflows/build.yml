name: Build CircuitoWatch APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          echo "/tmp/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Generate launcher icons
        run: |
          for spec in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            DENSITY="${spec%:*}"
            SIZE="${spec#*:}"
            DIR="app/src/main/res/mipmap-${DENSITY}"
            mkdir -p "$DIR"
            HALF=$((SIZE / 2))
            R1=$((SIZE / 2 - SIZE / 10))
            R2=$((SIZE / 4))
            convert -size "${SIZE}x${SIZE}" xc:"#000010" \
              -fill "#4da8f8" \
              -draw "ellipse ${HALF},${HALF} ${R1},${R1} 0,360" \
              -fill "rgba(255,255,255,0.86)" \
              -draw "ellipse ${HALF},${HALF} ${R2},${R2} 0,360" \
              "${DIR}/ic_launcher.png"
            cp "${DIR}/ic_launcher.png" "${DIR}/ic_launcher_round.png"
          done
          echo "Icons generados OK"

      - name: Set local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version=8.7 --distribution-type=bin
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk CircuitoWatch-v1.0.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CircuitoWatch-APK
          path: CircuitoWatch-v1.0.apk
          retention-days: 60
